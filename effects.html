<html>

<head>

<title>Advanced CSS Effects</title>

<link rel="stylesheet" href="../css/effects.css">

</head>

<body>

<h1 class="gradient-text">Advanced CSS Effects</h1>

<!-- Custom Checkbox -->

<h2>Custom Checkbox</h2>

<label class="checkbox-container">
<input type="checkbox">
<span class="checkmark"></span>
Subscribe Newsletter
</label>

<br><br>

<!-- Custom Radio Button -->

<h2>Custom Radio Button</h2>

<label class="radio-container">
<input type="radio" name="gender">
<span class="radio-mark"></span>
Male
</label>

<label class="radio-container">
<input type="radio" name="gender">
<span class="radio-mark"></span>
Female
</label>

<br><br>

<!-- Loading Animation -->

<h2>Loading Animation</h2>

<div class="loader"></div>

<br><br>

<!-- Text Clipping -->

<h2 class="clip-text">TEXT CLIPPING EFFECT</h2>

<br><br>

<!-- Shadow Effect -->

<div class="shadow-box">
Complex Shadow Box
</div>

</body>

</html>
