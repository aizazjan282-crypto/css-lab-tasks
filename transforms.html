<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform Gallery</title>
    <link rel="stylesheet" href="../css/transform.css">
</head>

<body>

<h1>CSS Transform Gallery</h1>

<!-- Rotation -->
<div class="box rotate">Rotate 45°</div>

<!-- Scaling -->
<div class="box scale">Scale 1.5x</div>

<!-- Translation -->
<div class="box translate">Translate X 50px</div>

<!-- 3D Rotation -->
<div class="box rotate-3d">3D Rotate</div>

<!-- Transform Origin -->
<div class="box origin">Transform Origin Top Left</div>

<!-- Combined Transform -->
<div class="box combined">Rotate + Scale + Translate</div>

</body>

</html>
